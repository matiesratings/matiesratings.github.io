<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <div id="sponsor-bar" class="hidden"></div>

        <div class="league-division-bar">
            <span class="league-division-label">Division:</span>
            <div id="divisionButtons"></div>
        </div>

        <div id="viewToggles">
            <button data-view="standings" class="active-toggle">Standings</button>
            <button data-view="fixtures">Fixtures</button>
            <button data-view="rosters">Teams</button>
        </div>

        <div id="standings-container">
            <div id="standings-sub-toggles">
                <button data-sub="team" class="active-toggle">Team</button>
                <button data-sub="player">Player</button>
            </div>
            <div id="team-standings"></div>
            <div id="player-standings" class="hidden"></div>
        </div>
        <div id="fixtures-container" class="hidden"></div>
        <div id="rosters-container" class="hidden"></div>
    </main>

    <!-- Info modal -->
    <button id="infoBtn" class="league-info-btn" aria-label="League info">&#9432; Rules & Info</button>
    <div id="infoModal" class="league-info-overlay">
        <div class="league-info-modal">
            <div class="league-info-modal-header">
                <h2>League Info</h2>
                <button class="group-modal-close" id="infoModalClose">&times;</button>
            </div>
            <div class="league-info-modal-body" id="infoModalBody"></div>
        </div>
    </div>

    <script src="/src/js/utils.js"></script>
    <script src="/src/js/league.js"></script>
</body>
</html>
