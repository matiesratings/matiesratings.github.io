<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>
    <div class="event-section">
        <div id="tournaments-container">
            <p style="color:#888">No tournaments published yet.</p>
        </div>
    </div>
  <script>
    function loadInclude(id, file) {
        fetch(file).then(r => r.text()).then(d => document.getElementById(id).innerHTML = d);
    }
    function toggleNav() {
        document.querySelector('.nav-links').classList.toggle('active');
    }
    document.addEventListener('click', function(event) {
        const navLinks = document.querySelector('.nav-links');
        const hamburger = document.querySelector('.hamburger');
        if (navLinks && hamburger && !navLinks.contains(event.target) && !hamburger.contains(event.target)) {
            navLinks.classList.remove('active');
        }
    });
    document.addEventListener("DOMContentLoaded", function () {
        loadInclude("header-placeholder", "/components/header.html");
        const setTitle = () => {
            const el = document.getElementById("header-title");
            if (el) el.innerHTML = "Tournaments";
            else setTimeout(setTitle, 50);
        };
        setTitle();
    });
  </script>
</body>
</html>
