<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maties Juniors Open</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div id="viewToggles"></div>
  <div id="tournament-info" style="display:none">
    <div class="event-section">
        <div class="event-description">
            <p><strong>Date:</strong> 4 April 2026 - 4 April 2026</p>
            <p><strong>Location:</strong> Maties Gymnasium </p>
        </div>
        <div id="events-container">
            <button class="event" onclick="location.href='/pages/tournaments/maties_juniors_open/maties_juniors_open.html?event=bu19'">Boys U19</button>
        </div>
    </div>
  </div>
  <div id="contentContainer"></div>

  <script src="/src/js/draw.js"></script>
  <script>
    function loadInclude(id, file) {
        fetch(file).then(r => r.text()).then(d => document.getElementById(id).innerHTML = d);
    }
    function toggleNav() {
        document.querySelector('.nav-links').classList.toggle('active');
    }
    document.addEventListener('click', function(ev) {
        const navLinks = document.querySelector('.nav-links');
        const hamburger = document.querySelector('.hamburger');
        if (navLinks && hamburger && !navLinks.contains(ev.target) && !hamburger.contains(ev.target)) {
            navLinks.classList.remove('active');
        }
    });

    const eventNameMap = {'bu19': 'Boys U19'};

    document.addEventListener("DOMContentLoaded", function () {
        loadInclude("header-placeholder", "/components/header.html");

        const params = new URLSearchParams(window.location.search);
        const eventSlug = params.get("event");

        if (!eventSlug) {
            // Show tournament overview with event buttons
            document.getElementById("tournament-info").style.display = "block";
            const setTitle = () => {
                const el = document.getElementById("header-title");
                if (el) el.innerHTML = "Maties Juniors Open";
                else setTimeout(setTitle, 50);
            };
            setTitle();
        } else {
            // Load event draw from static JSON
            const eventName = eventNameMap[eventSlug] || eventSlug;
            const setTitle = () => {
                const el = document.getElementById("header-title");
                if (el) el.innerHTML = "Maties Juniors Open<br>" + eventName;
                else setTimeout(setTitle, 50);
            };
            setTitle();

            let currentView = 'knockouts';
            let lastData = null;

            function loadEventData() {
                const cacheBust = '?t=' + Date.now();
                fetch("/src/data/tournament/maties_juniors_open/" + eventSlug + ".json" + cacheBust)
                    .then(r => r.json())
                    .then(data => {
                        lastData = data;
                        const toggleContainer = document.getElementById("viewToggles");

                        // Only build buttons once
                        if (toggleContainer.children.length === 0) {
                            if (data.groups) {
                                const btnGroups = document.createElement("button");
                                btnGroups.id = "btnGroups";
                                btnGroups.textContent = "Groups";
                                btnGroups.addEventListener("click", () => {
                                    currentView = 'groups';
                                    renderGroups(data, eventName);
                                    btnGroups.classList.add('active-toggle');
                                    const ko = document.getElementById("btnKnockouts");
                                    if (ko) ko.classList.remove('active-toggle');
                                });
                                toggleContainer.appendChild(btnGroups);
                            }
                            if (data.knockouts) {
                                const btnKnockouts = document.createElement("button");
                                btnKnockouts.id = "btnKnockouts";
                                btnKnockouts.textContent = "Knockouts";
                                btnKnockouts.addEventListener("click", () => {
                                    currentView = 'knockouts';
                                    renderKnockouts(data, eventName);
                                    btnKnockouts.classList.add('active-toggle');
                                    const gr = document.getElementById("btnGroups");
                                    if (gr) gr.classList.remove('active-toggle');
                                });
                                toggleContainer.appendChild(btnKnockouts);
                            }

                            // Add live indicator
                            const liveIndicator = document.createElement("span");
                            liveIndicator.id = "liveIndicator";
                            liveIndicator.style.cssText = "margin-left:auto;display:flex;align-items:center;gap:5px;font-size:12px;color:#888;";
                            liveIndicator.innerHTML = '<span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite"></span> LIVE';
                            toggleContainer.appendChild(liveIndicator);
                            toggleContainer.style.display = "flex";
                            toggleContainer.style.alignItems = "center";
                        }

                        // Re-render current view with fresh data
                        if (currentView === 'knockouts' && data.knockouts) {
                            renderKnockouts(data, eventName);
                            const ko = document.getElementById("btnKnockouts");
                            if (ko) ko.classList.add('active-toggle');
                            const gr = document.getElementById("btnGroups");
                            if (gr) gr.classList.remove('active-toggle');
                        } else if (data.groups) {
                            renderGroups(data, eventName);
                            const gr = document.getElementById("btnGroups");
                            if (gr) gr.classList.add('active-toggle');
                            const ko = document.getElementById("btnKnockouts");
                            if (ko) ko.classList.remove('active-toggle');
                        }

                        // Update live indicator timestamp
                        const indicator = document.getElementById("liveIndicator");
                        if (indicator) {
                            const now = new Date().toLocaleTimeString();
                            indicator.innerHTML = '<span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite"></span> LIVE &middot; ' + now;
                        }
                    })
                    .catch(err => {
                        document.getElementById("contentContainer").innerHTML =
                            "<p style='padding:20px'>Error loading event data.</p>";
                    });
            }

            // Initial load
            loadEventData();

            // Auto-refresh every 60 seconds for live results
            setInterval(loadEventData, 60000);
        }
    });
  </script>
  <style>
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
  </style>
</body>
</html>
