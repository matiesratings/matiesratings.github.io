<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maties Juniors Open</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div id="viewToggles"></div>
  <div id="tournament-info" style="display:none">
    <div class="event-section">
        <div class="event-description">
            <p><strong>Date:</strong> 4 April 2026</p>
            <p><strong>Location:</strong> Maties Gymnasium</p>
        </div>
        <div id="events-container">
            <button class="event" onclick="location.href='/pages/tournaments/maties_juniors_open/maties_juniors_open.html?event=1'">Boys U19</button>
        </div>
    </div>
  </div>
  <div id="contentContainer"></div>

  <script src="/src/js/draw.js"></script>
  <script>
    function loadInclude(id, file) {
        fetch(file).then(r => r.text()).then(d => document.getElementById(id).innerHTML = d);
    }
    function toggleNav() {
        document.querySelector('.nav-links').classList.toggle('active');
    }
    document.addEventListener('click', function(ev) {
        const navLinks = document.querySelector('.nav-links');
        const hamburger = document.querySelector('.hamburger');
        if (navLinks && hamburger && !navLinks.contains(ev.target) && !hamburger.contains(ev.target)) {
            navLinks.classList.remove('active');
        }
    });

    const API_BASE = "https://tournament-manager-19sp.onrender.com/api";
    const TOURNAMENT_ID = 1;
    const eventNameMap = {"1": "Boys U19"};

    document.addEventListener("DOMContentLoaded", function () {
        loadInclude("header-placeholder", "/components/header.html");
        const params = new URLSearchParams(window.location.search);
        const eventId = params.get("event");

        if (!eventId) {
            document.getElementById("tournament-info").style.display = "block";
            const setTitle = () => {
                const el = document.getElementById("header-title");
                if (el) el.innerHTML = "Maties Juniors Open";
                else setTimeout(setTitle, 50);
            };
            setTitle();
        } else {
            const eventName = eventNameMap[eventId] || "Event";
            const setTitle = () => {
                const el = document.getElementById("header-title");
                if (el) el.innerHTML = "Maties Juniors Open<br>" + eventName;
                else setTimeout(setTitle, 50);
            };
            setTitle();

            let currentView = "knockouts";

            function loadEventData() {
                fetch(API_BASE + "/tournaments/" + TOURNAMENT_ID + "/export/matiesratings-draws/" + eventId)
                    .then(r => r.json())
                    .then(data => {
                        const tc = document.getElementById("viewToggles");
                        if (tc.children.length === 0) {
                            if (data.groups) {
                                const bg = document.createElement("button");
                                bg.id = "btnGroups"; bg.textContent = "Groups";
                                bg.addEventListener("click", () => { currentView="groups"; renderGroups(data,eventName); bg.classList.add("active-toggle"); const k=document.getElementById("btnKnockouts"); if(k) k.classList.remove("active-toggle"); });
                                tc.appendChild(bg);
                            }
                            if (data.knockouts) {
                                const bk = document.createElement("button");
                                bk.id = "btnKnockouts"; bk.textContent = "Knockouts";
                                bk.addEventListener("click", () => { currentView="knockouts"; renderKnockouts(data,eventName); bk.classList.add("active-toggle"); const g=document.getElementById("btnGroups"); if(g) g.classList.remove("active-toggle"); });
                                tc.appendChild(bk);
                            }
                            const li = document.createElement("span"); li.id="liveIndicator";
                            li.style.cssText="position:absolute;right:10px;display:flex;align-items:center;gap:5px;font-size:12px;color:#888;";
                            tc.appendChild(li); tc.style.display="flex"; tc.style.justifyContent="center"; tc.style.alignItems="center"; tc.style.position="relative";
                        }
                        if (currentView==="knockouts" && data.knockouts) {
                            renderKnockouts(data,eventName);
                            const k=document.getElementById("btnKnockouts"); if(k) k.classList.add("active-toggle");
                            const g=document.getElementById("btnGroups"); if(g) g.classList.remove("active-toggle");
                        } else if (data.groups) {
                            renderGroups(data,eventName);
                            const g=document.getElementById("btnGroups"); if(g) g.classList.add("active-toggle");
                            const k=document.getElementById("btnKnockouts"); if(k) k.classList.remove("active-toggle");
                        }
                        const ind = document.getElementById("liveIndicator");
                        if (ind) { const now=new Date().toLocaleTimeString(); ind.innerHTML="<span style='width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite'></span> LIVE &middot; "+now; }
                    })
                    .catch(err => {
                        const ind = document.getElementById("liveIndicator");
                        if(ind) ind.innerHTML="<span style='width:8px;height:8px;border-radius:50%;background:#f87171;display:inline-block'></span> offline";
                    });
            }
            loadEventData();
            setInterval(loadEventData, 30000);
        }
    });
  </script>
  <style>@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }</style>
</body>
</html>
